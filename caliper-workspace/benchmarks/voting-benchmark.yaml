test:
  name: voting-benchmark
  description: Uniform 1000-transaction evaluation of blockchain voting system

  workers:
    number: 5

  rounds:

    - label: RegisterVoter
      txNumber: 1000
      rateControl:
        type: fixed-rate
        opts:
          tps: 100
      workload:
        module: workload/registerVoter.js
        arguments:
          poolSize: 600
          batchSize: 20

    - label: CastVote   # ONLY voting test
      txNumber: 1000
      rateControl:
        type: fixed-rate
        opts:
          tps: 100
      workload:
        module: workload/castVote.js
        arguments:
          poolSize: 600   # must be enough
          batchSize: 20

    - label: QueryVoterStatus
      txNumber: 1000
      rateControl:
        type: fixed-rate
        opts:
          tps: 200
      workload:
        module: workload/queryVoterStatus.js

    - label: TallyVotes
      txNumber: 1000
      rateControl:
        type: fixed-rate
        opts:
          tps: 200
      workload:
        module: workload/tallyVotes.js

    - label: AuditTrail
      txNumber: 1000
      rateControl:
        type: fixed-rate
        opts:
          tps: 250
      workload:
        module: workload/audittrail.js

    - label: ResultConsistency
      txNumber: 1000
      rateControl:
        type: fixed-rate
        opts:
          tps: 250
      workload:
        module: workload/resultconsistency.js